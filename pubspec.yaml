name: news_app
description: A Flutter news application with offline support using NewsAPI.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'



dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.0

  # Local persistence (Hive for offline support)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image loading with caching
  cached_network_image: ^3.3.1

  # State management
  provider: ^6.1.2

  # Connectivity
  connectivity_plus: ^5.0.2

  # URL launcher for full article
  url_launcher: ^6.2.5

  # Shimmer loading effect
  shimmer: ^3.0.0

  # Animations
  flutter_animate: ^4.5.0

  # Share functionality
  share_plus: ^7.2.2

  # Intl for date formatting
  intl: ^0.18.1

  # Google fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf

